<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Chat con Jack Sparrow</title>
    <link rel="icon" type="image/x-icon" href="assets/favicon-32x32.png" />
    <style>
      /* Fondo de la página: imitando la madera oscura de un barco o la noche en el mar */
      body {
        font-family: "Georgia", "Times New Roman", serif;
        background: #1c2126;
        background: linear-gradient(
          90deg,
          rgba(28, 33, 38, 1) 0%,
          rgba(0, 251, 255, 1) 100%
        );
        display: flex;
        justify-content: center;
        padding: 20px;
        color: #332115;
      }

      /* Contenedor principal: estilo pergamino antiguo */
      #chat-container {
        width: 100%;
        max-width: 600px;
        background-color: #eaddcf; /* Color pergamino */
        border: 4px solid #5c3a21; /* Borde de madera oscura */
        border-radius: 8px;
        box-shadow:
          0 10px 20px rgba(0, 0, 0, 0.7),
          inset 0 0 40px rgba(139, 69, 19, 0.2);
        padding: 20px;
      }

      /* Encabezado pirata */
      h2 {
        text-align: center;
        margin-top: 0;
        color: #5c3a21;
        font-size: 28px;
        text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.2);
        border-bottom: 2px dashed #8b5a2b;
        padding-bottom: 10px;
      }

      /* Zona de mensajes */
      #messages {
        height: 400px;
        overflow-y: auto;
        border: 2px solid #8b5a2b;
        background-color: #f4ecdf;
        padding: 15px;
        margin-bottom: 15px;
        border-radius: 4px;
        box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.1);
      }

      /* Estilo general de los globos de mensaje */
      .msg {
        margin-bottom: 15px;
        padding: 12px 16px;
        border-radius: 8px;
        width: fit-content;
        max-width: 80%;
        line-height: 1.4;
        font-size: 16px;
        box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.2);
      }

      /* Mensaje del usuario (Marinero) */
      .user {
        background-color: #2c3e50; /* Azul océano oscuro */
        color: #eaddcf;
        margin-left: auto;
        border-bottom-right-radius: 0;
        border: 1px solid #1a252f;
      }

      /* Mensaje del Bot (Jack Sparrow) */
      .bot {
        background-color: #800000; /* Rojo carmesí/borgoña */
        color: #f4ecdf;
        margin-right: auto;
        border-bottom-left-radius: 0;
        border: 1px solid #4a0000;
      }

      /* Zona de entrada de texto */
      .input-area {
        display: flex;
        gap: 10px;
      }

      input[type="text"] {
        flex: 1;
        padding: 12px;
        border: 2px solid #8b5a2b;
        background-color: #f9f5ed;
        color: #332115;
        font-family: "Georgia", serif;
        font-size: 16px;
        border-radius: 4px;
      }

      input[type="text"]:focus {
        outline: none;
        border-color: #800000;
        background-color: #fff;
      }

      /* Botón de enviar: estilo doblón de oro */
      button {
        padding: 12px 20px;
        background-color: #d4af37; /* Dorado metálico */
        color: #332115;
        font-weight: bold;
        font-family: "Georgia", serif;
        font-size: 16px;
        border: 2px solid #b8860b;
        border-radius: 4px;
        cursor: pointer;
        text-shadow: 1px 1px 0px rgba(255, 255, 255, 0.4);
        box-shadow:
          0 4px 0 #b8860b,
          0 5px 5px rgba(0, 0, 0, 0.4);
        transition: all 0.1s;
      }

      button:active {
        transform: translateY(4px);
        box-shadow:
          0 0 0 #b8860b,
          0 1px 2px rgba(0, 0, 0, 0.4);
      }

      /* Personalización de la barra de scroll para navegadores webkit (Chrome/Edge/Safari) */
      #messages::-webkit-scrollbar {
        width: 10px;
      }
      #messages::-webkit-scrollbar-track {
        background: #eaddcf;
        border-left: 1px solid #8b5a2b;
      }
      #messages::-webkit-scrollbar-thumb {
        background: #8b5a2b;
        border-radius: 5px;
      }
    </style>
  </head>
  <body>
    <div id="chat-container">
      <h2>🏴‍☠️ La Bitácora de Jack ⚓</h2>
      <div id="messages"></div>
      <div class="input-area">
        <input
          type="text"
          id="user-input"
          placeholder="Habla, grumete..."
          onkeypress="if (event.key === 'Enter') enviarMensaje();"
        />
        <button onclick="enviarMensaje()">Disparar</button>
      </div>
    </div>

    <script>
      let historial = [];

      async function enviarMensaje() {
        const inputElement = document.getElementById("user-input");
        const texto = inputElement.value.trim();
        if (!texto) return;

        añadirMensajeAlDOM("Tú", texto, "user");
        inputElement.value = "";

        historial.push({ role: "user", parts: [{ text: texto }] });

        try {
          const respuesta = await fetch("/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(historial),
          });

          const data = await respuesta.json();

          añadirMensajeAlDOM("Capitán Jack", data.texto, "bot");
          historial.push({ role: "model", parts: [{ text: data.texto }] });
        } catch (error) {
          añadirMensajeAlDOM(
            "Sistema",
            "El barco ha perdido la conexión, ¡maldición!",
            "bot",
          );
          historial.pop();
        }
      }

      function añadirMensajeAlDOM(emisor, texto, claseCSS) {
        const div = document.createElement("div");
        div.className = `msg ${claseCSS}`;
        div.innerText = `${emisor}: ${texto}`;
        document.getElementById("messages").appendChild(div);
        document.getElementById("messages").scrollTop =
          document.getElementById("messages").scrollHeight;
      }
    </script>
  </body>
</html>
